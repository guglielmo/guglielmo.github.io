cases:
  maps:
    idx: "01"
    title: "MAPS — directing an institutional data-lake"
    meta: "Fondazione Gran Sasso Tech · 2025 →"
    lead: "A governed territorial data-lake for place-based research — identifying functional areas from citizens' real daily-mobility patterns, which requires integrating heterogeneous public sources under one governance model."
    blocks:
      - h: "My role"
        p: "Independent principal, personal P.IVA, fixed-scope: ICT specialist consulting, quality assurance and acceptance. In practice I directed the realization end-to-end."
      - h: "What I directed"
        p: "Architectural review and technical roadmap of the data-lake and interoperability components. I authored the WP2 deliverables — technical design, cloud solution design, hosting, ETL pipelines, validation, delivery report. I wrote the QA Playbook (branching, code review, coverage, logging and observability) and the Security &amp; Privacy-by-Design checklist (secrets management, hardening, audit log). I defined the coordination procedures for the development team, trained internal and external resources, and own release acceptance."
      - h: "Stack directed"
        p: "PostgreSQL + PostGIS, DuckDB, Prefect, OpenMetadata, Great Expectations, Docling; medallion (bronze / silver / gold) layering."
      - h: "Outcome"
        p: "An institutional data-lake stood up with governance, QA and security built in from the start — and a team enabled to run it, including a new resource productive within a week. Ongoing through 2026."
    sells: "Architecture direction + team enablement."
  llm-monitoring:
    idx: "02"
    title: "An LLM-based monitoring platform, in production"
    meta: "A public-affairs consultancy · via DEPP · 2024 →"
    lead: "Analysts monitor the news stream for each client's interests; the volume makes manual triage the bottleneck. I designed an application that reads the stream and categorizes, summarizes and prioritizes it against each client's declared interests."
    blocks:
      - h: "My role"
        p: "Ideation and application design, delivered within DEPP's offer. The first LLM-based application in the portfolio."
      - h: "What it does"
        p: "LLMs via API over an ingestion pipeline: it categorizes incoming items, summarizes them, and extracts and prioritizes what matters against each client's interests."
      - h: "Why it matters"
        p: "The production proof of the AI-application strand — and a concrete illustration of the nexus: the application works because the data layer beneath it (ingestion, structure, governance) was designed for it."
    sells: "AI applications over data + both layers."
  opencoesione:
    idx: "03"
    title: "OpenCoesione.gov.it — national data architecture"
    meta: "Public portal · EU cohesion funds"
    lead: "The data model behind Italy's national portal for EU cohesion funds — a public-data system that has to be correct, transparent and durable, built to be queried, audited and trusted."
    blocks:
      - h: "The work"
        p: "I designed the data architecture: the model that makes cohesion-fund spending queryable and accountable across projects, territories and themes. Part of a 25-year lineage of public-data platforms — OPDM, OpenBilanci, the CIPE deliberations archive, OpenDataLazio — and the Popolo international standard for data on people, organizations and posts."
      - h: "Why it matters"
        p: "The archetype of what I direct: data as a public good, modelled for correctness and transparency, durable enough that institutions still rely on it years later."
    sells: "Data-platform architecture for institutions."
  health-system:
    idx: "04"
    title: "A management system for a federation of health authorities"
    meta: "An Italian federation of health and hospital authorities · via DEPP"
    lead: "A new custom management system was needed — from ambiguous client requirements to a working application, architecture and a team that ships."
    blocks:
      - h: "My role"
        p: "Solution architect and technical direction."
      - h: "What I did"
        p: "Gathered and structured the client's specifications; defined the application architecture and the supporting infrastructure; set the technology choices; routed and instructed the development team to build it; and continue to hold the infrastructure — including the Kubernetes layer — as the operating foundation."
      - h: "The pattern"
        p: "The repeatable thing I sell: take a data-heavy, under-specified need, turn it into an architecture and an infrastructure, and hand a development team a clear path to ship. Direction, not hands-on tickets."
    sells: "Architecture direction + hands-on foundation as credibility."
