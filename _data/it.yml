about:
  label: Chi sono
  heading: "Dalla matematica, non dal ciclo dell'hype"
  portrait: "/assets/img/guglielmo-celata.jpg"
  portrait_alt: "Guglielmo Celata"
  specs:
    - k: Sede
      v: "P.IVA personale · remoto"
    - k: Lingue
      v: "IT · EN"
    - k: Background
      v: "Openpolis · DEPP · GST"
    - k: Origine
      v: "Fisica / reti neurali, 1996"
  body:
    - "Sono un principal indipendente. Da 25 anni trasformo dati pubblici complessi in piattaforme su cui le istituzioni contano — dall'architettura dati nazionale di OpenCoesione al data-lake territoriale MAPS che dirigo oggi."
    - "Ho costruito infrastruttura dati per l'accountability pubblica: OPDM, la piattaforma dietro il monitoraggio di politica e istituzioni di Openpolis; l'archivio nazionale delle delibere CIPE; lo standard internazionale <strong>Popolo</strong> per i dati su persone e organizzazioni. Sono una delle persone che hanno costruito Openpolis come fondazione nazionale, e ho co-fondato DEPP, dove sono CTO."
    - "Dal 2024 progetto anche le applicazioni di IA che rendono quei dati accessibili e utilizzabili. La lezione, più semplice dell'hype: <strong>un'applicazione di IA fondata sui dati vale quanto la piattaforma che ha sotto — progetto entrambi i livelli.</strong>"

