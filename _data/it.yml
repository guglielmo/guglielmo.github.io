cases:
  maps:
    idx: "01"
    title: "MAPS — dirigere un data-lake istituzionale"
    meta: "Fondazione Gran Sasso Tech · 2025 →"
    lead: "Un data-lake territoriale governato per la ricerca place-based — identificare aree funzionali dai reali pattern di mobilità quotidiana dei cittadini, cosa che richiede di integrare fonti pubbliche eterogenee sotto un unico modello di governance."
    blocks:
      - h: "Il mio ruolo"
        p: "Principal indipendente, P.IVA personale, a scopo definito: consulenza specialistica ICT, quality assurance e collaudo. In pratica ho diretto la realizzazione end-to-end."
      - h: "Cosa ho diretto"
        p: "Revisione architetturale e roadmap tecnica del data-lake e dei componenti di interoperabilità. Ho redatto i deliverable del WP2 — design tecnico, cloud solution design, hosting, pipeline ETL, validazione, delivery report. Ho scritto il QA Playbook (branching, code review, coverage, logging e observability) e la checklist Security &amp; Privacy-by-Design (gestione dei segreti, hardening, audit log). Ho definito le procedure di coordinamento del team di sviluppo, formato risorse interne ed esterne, e detengo il collaudo dei rilasci."
      - h: "Stack diretto"
        p: "PostgreSQL + PostGIS, DuckDB, Prefect, OpenMetadata, Great Expectations, Docling; stratificazione medallion (bronze / silver / gold)."
      - h: "Esito"
        p: "Un data-lake istituzionale messo in piedi con governance, QA e sicurezza integrate fin dall'inizio — e un team abilitato a mandarlo avanti, inclusa una nuova risorsa produttiva in una settimana. In corso per tutto il 2026."
    sells: "Direzione architetturale + abilitazione del team."
  llm-monitoring:
    idx: "02"
    title: "Una piattaforma di monitoraggio basata su LLM, in produzione"
    meta: "Una società di public affairs · via DEPP · 2024 →"
    lead: "Gli analisti monitorano il flusso di notizie per gli interessi di ciascun cliente; il volume rende la triage manuale il collo di bottiglia. Ho progettato un'applicazione che legge il flusso e lo categorizza, sintetizza e prioritizza rispetto agli interessi dichiarati di ciascun cliente."
    blocks:
      - h: "Il mio ruolo"
        p: "Ideazione e progettazione dell'applicazione, erogata all'interno dell'offerta DEPP. La prima applicazione basata su LLM del portafoglio."
      - h: "Cosa fa"
        p: "LLM via API sopra una pipeline di ingestione: categorizza gli elementi in ingresso, li sintetizza ed estrae e prioritizza ciò che conta rispetto agli interessi di ciascun cliente."
      - h: "Perché conta"
        p: "La prova in produzione del filone applicativo di IA — e un'illustrazione concreta del nesso: l'applicazione funziona perché il livello dati sottostante (ingestione, struttura, governance) è stato progettato per essa."
    sells: "Applicazioni di IA fondate sui dati + entrambi i livelli."
  opencoesione:
    idx: "03"
    title: "OpenCoesione.gov.it — architettura dati nazionale"
    meta: "Portale pubblico · fondi di coesione UE"
    lead: "Il modello dati dietro il portale nazionale italiano sui fondi di coesione europei — un sistema di dati pubblici che deve essere corretto, trasparente e duraturo, costruito per essere interrogato, verificato e affidabile."
    blocks:
      - h: "Il lavoro"
        p: "Ho progettato l'architettura dati: il modello che rende la spesa dei fondi di coesione interrogabile e verificabile per progetti, territori e temi. Parte di una filiera venticinquennale di piattaforme di dati pubblici — OPDM, OpenBilanci, l'archivio delle delibere CIPE, OpenDataLazio — e dello standard internazionale Popolo per i dati su persone, organizzazioni e cariche."
      - h: "Perché conta"
        p: "L'archetipo di ciò che dirigo: il dato come bene comune, modellato per correttezza e trasparenza, abbastanza duraturo da restare un riferimento per le istituzioni anni dopo."
    sells: "Architettura di piattaforme dati per le istituzioni."
  health-system:
    idx: "04"
    title: "Un gestionale per una federazione di aziende sanitarie"
    meta: "Una federazione italiana di aziende sanitarie e ospedaliere · via DEPP"
    lead: "Serviva un nuovo gestionale su misura — da requisiti ambigui del cliente a un'applicazione funzionante, un'architettura e un team che rilascia."
    blocks:
      - h: "Il mio ruolo"
        p: "Solution architect e direzione tecnica."
      - h: "Cosa ho fatto"
        p: "Ho raccolto e strutturato le specifiche del cliente; definito l'architettura dell'applicazione e l'infrastruttura di supporto; fissato le scelte tecnologiche; indirizzato e istruito il team di sviluppo perché la costruisse; e continuo a tenere l'infrastruttura — incluso il livello Kubernetes — come fondamento operativo."
      - h: "Il pattern"
        p: "La cosa ripetibile che vendo: prendere un bisogno data-intensive e sotto-specificato, trasformarlo in un'architettura e un'infrastruttura, e consegnare a un team di sviluppo un percorso chiaro per rilasciare. Direzione, non mani sui ticket."
    sells: "Direzione architetturale + fondamento hands-on come credibilità."
